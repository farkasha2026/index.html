<script>
    // PWA - تسجيل عامل الخدمة بطريقة مباشرة متوافقة مع أمن المتصفحات ومنصات الاستضافة
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            // إنشاء كود عامل الخدمة كملف نصي تنفيذي مباشر
            const swCode = `
                const CACHE_NAME = 'inventory-pwa-v5';
                const ASSETS = [
                    './',
                    './index.html',
                    'https://cdn.tailwindcss.com',
                    'https://fonts.googleapis.com/css2?family=Cairo:wght=400;600;800&display=swap'
                ];

                self.addEventListener('install', (e) => {
                    e.waitUntil(
                        caches.open(CACHE_NAME).then((cache) => cache.addAll(ASSETS))
                    );
                });

                self.addEventListener('activate', (e) => {
                    e.waitUntil(
                        caches.keys().then((keys) => Promise.all(
                            keys.map((key) => { if (key !== CACHE_NAME) return caches.delete(key); })
                        ))
                    );
                });

                self.addEventListener('fetch', (e) => {
                    if (e.request.method !== 'GET') return;
                    e.respondWith(
                        caches.match(e.request).then((cached) => {
                            return cached || fetch(e.request).then((res) => {
                                if (res && res.status === 200 && e.request.url.startsWith('http')) {
                                    const clone = res.clone();
                                    caches.open(CACHE_NAME).then((cache) => cache.put(e.request, clone));
                                }
                                return res;
                            }).catch(() => caches.match('./index.html'));
                        })
                    );
                });
            `;

            try {
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl)
                    .then(() => console.log('PWA Registered'))
                    .catch(() => {
                        // حل بديل فوري إذا رفض المتصفح الـ Blob: تشغيل التطبيق بدون PWA لتفادي الشاشة البيضاء
                        console.log('PWA active via standard mode');
                    });
            } catch (err) {
                console.log('PWA bypass active');
            }
        });
    }

    // منطق البرنامج الفعلي المستقر
    document.addEventListener('DOMContentLoaded', () => {
        const dateInput = document.getElementById('recordDate');
        const currentDateDisplay = document.getElementById('currentDateDisplay');
        const saveBtn = document.getElementById('saveBtn');
        const historyTableBody = document.getElementById('historyTableBody');
        const noHistoryMsg = document.getElementById('noHistoryMsg');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const dynamicCategoriesContainer = document.getElementById('dynamicCategoriesContainer');
        const noCategoriesAlert = document.getElementById('noCategoriesAlert');
        const addFirstCategoryBtn = document.getElementById('addFirstCategoryBtn');
        
        const manageCategoriesBtn = document.getElementById('manageCategoriesBtn');
        const manageCategoriesModal = document.getElementById('manageCategoriesModal');
        const closeManageModalBtn = document.getElementById('closeManageModalBtn');
        const addCategoryForm = document.getElementById('addCategoryForm');
        const newCatName = document.getElementById('newCatName');
        const newCatPrice = document.getElementById('newCatPrice');
        const categoriesListContainer = document.getElementById('categoriesListContainer');
        const saveCategoriesOrderBtn = document.getElementById('saveCategoriesOrderBtn');

        const modal = document.getElementById('notificationModal');
        const modalContent = document.getElementById('notificationContent');
        const closeModalBtn = document.getElementById('closeModalBtn');

        const pwaInstallBanner = document.getElementById('pwaInstallBanner');
        const pwaInstallBtn = document.getElementById('pwaInstallBtn');
        const pwaDismissBtn = document.getElementById('pwaDismissBtn');
        let deferredPrompt;

        const colorThemes = [
            { bg: 'bg-blue-50', border: 'border-blue-100', text: 'text-blue-800', dot: 'bg-blue-500', focus: 'focus:ring-blue-500' },
            { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-800', dot: 'bg-amber-500', focus: 'focus:ring-amber-500' },
            { bg: 'bg-green-50', border: 'border-green-100', text: 'text-green-800', dot: 'bg-green-500', focus: 'focus:ring-green-500' },
            { bg: 'bg-purple-50', border: 'border-purple-100', text: 'text-purple-800', dot: 'bg-purple-500', focus: 'focus:ring-purple-500' },
            { bg: 'bg-rose-50', border: 'border-rose-100', text: 'text-rose-800', dot: 'bg-rose-500', focus: 'focus:ring-rose-500' },
            { bg: 'bg-teal-50', border: 'border-teal-100', text: 'text-teal-800', dot: 'bg-teal-500', focus: 'focus:ring-teal-500' }
        ];

        let categories = JSON.parse(localStorage.getItem('inventoryCategories')) || [
            { id: '155', name: 'كراتين فئة 155 جنيه', price: 155, themeIdx: 0 },
            { id: '150', name: 'كراتين فئة 150 جنيه (الفيت)', price: 150, themeIdx: 1 },
            { id: '100', name: 'كراتين فئة 100 جنيه', price: 100, themeIdx: 2 },
            { id: '50', name: 'كراتين فئة 50 جنيه', price: 50, themeIdx: 3 }
        ];

        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        if (dateInput) {
            dateInput.value = `${yyyy}-${mm}-${dd}`;
            updateDateDisplay(today);
        }

        initApp();

        function initApp() {
            renderCategoryForms();
            loadHistory();
            applyCarriedOverBalances();
            calculateAll();
        }

        if (dateInput) {
            dateInput.addEventListener('change', function() {
                const selectedDate = new Date(this.value);
                if(!isNaN(selectedDate)) {
                    updateDateDisplay(selectedDate);
                }
                resetFormInputs();
                applyCarriedOverBalances();
                calculateAll();
            });
        }

        function updateDateDisplay(dateObj) {
            if (currentDateDisplay) {
                currentDateDisplay.textContent = new Intl.DateTimeFormat('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).format(dateObj);
            }
        }

        function resetFormInputs() {
            categories.forEach(cat => {
                ['prev_', 'in_', 'cust_return_', 'out_', 'ret_wh_'].forEach(prefix => {
                    const el = document.getElementById(`${prefix}${cat.id}`);
                    if (el) el.value = 0;
                });
            });
        }

        function applyCarriedOverBalances() {
            if (!dateInput) return;
            const currentDateVal = dateInput.value;
            if (!currentDateVal) return;

            const history = JSON.parse(localStorage.getItem('inventoryHistory')) || [];
            if (history.length === 0) return;

            const currentParts = currentDateVal.split('-');
            const currentObj = new Date(currentParts[0], currentParts[1] - 1, currentParts[2]);
            currentObj.setDate(currentObj.getDate() - 1);
            
            const prevY = currentObj.getFullYear();
            const prevM = String(currentObj.getMonth() + 1).padStart(2, '0');
            const prevD = String(currentObj.getDate()).padStart(2, '0');
            const targetPreviousDateStr = `${prevY}-${prevM}-${prevD}`;

            const previousRecord = history.find(r => r.date === targetPreviousDateStr);

            categories.forEach(cat => {
                const prevInputEl = document.getElementById(`prev_${cat.id}`);
                if (prevInputEl) {
                    if (previousRecord && previousRecord.items && previousRecord.items[cat.id]) {
                        prevInputEl.value = previousRecord.items[cat.id].bal || 0;
                    } else {
                        prevInputEl.value = 0;
                    }
                }
            });
        }

        function renderCategoryForms() {
            if (!dynamicCategoriesContainer) return;
            dynamicCategoriesContainer.innerHTML = '';
            
            if (categories.length === 0) {
                dynamicCategoriesContainer.classList.add('hidden');
                if (noCategoriesAlert) noCategoriesAlert.classList.remove('hidden');
                return;
            }

            dynamicCategoriesContainer.classList.remove('hidden');
            if (noCategoriesAlert) noCategoriesAlert.classList.add('hidden');

            categories.forEach(cat => {
                const theme = colorThemes[cat.themeIdx % colorThemes.length];
                const catHtml = `
                    <div class="${theme.bg} p-4 rounded-lg border ${theme.border} transition-all duration-200 hover:shadow-sm">
                        <h2 class="text-lg font-bold ${theme.text} mb-3 flex items-center">
                            <span class="w-3 h-3 ${theme.dot} rounded-full ml-2"></span>
                            ${cat.name}
                        </h2>
                        <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">رصيد سابق</label>
                                <input type="number" id="prev_${cat.id}" value="0" min="0" class="w-full px-3 py-2 border border-gray-300 rounded-md ${theme.focus} item-input" data-price="${cat.price}" data-cat="${cat.id}">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">وارد اليوم</label>
                                <input type="number" id="in_${cat.id}" value="0" min="0" class="w-full px-3 py-2 border border-gray-300 rounded-md ${theme.focus} item-input" data-price="${cat.price}" data-cat="${cat.id}">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">مرتجع العميل</label>
                                <input type="number" id="cust_return_${cat.id}" value="0" min="0" class="w-full px-3 py-2 border border-gray-300 rounded-md ${theme.focus} item-input" data-price="${cat.price}" data-cat="${cat.id}">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1 text-red-600">منصرف (مبيعات)</label>
                                <input type="number" id="out_${cat.id}" value="0" min="0" class="w-full px-3 py-2 border border-red-300 rounded-md focus:ring-red-500 focus:border-red-500 item-input" data-price="${cat.price}" data-cat="${cat.id}">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1 text-orange-600">ارتجاع للمخزن</label>
                                <input type="number" id="ret_wh_${cat.id}" value="0" min="0" class="w-full px-3 py-2 border border-orange-300 rounded-md focus:ring-orange-500 focus:border-orange-500 item-input" data-price="${cat.price}" data-cat="${cat.id}">
                            </div>
                            <div class="bg-white p-2 rounded-md border border-gray-200 shadow-inner flex flex-col justify-center items-center col-span-2 md:col-span-1">
                                <span class="text-xs text-gray-500">الرصيد الحالي</span>
                                <span id="bal_${cat.id}" class="text-lg font-bold text-gray-800">0</span>
                            </div>
                        </div>
                    </div>
                `;
                dynamicCategoriesContainer.insertAdjacentHTML('beforeend', catHtml);
            });

            document.querySelectorAll('.item-input').forEach(input => {
                input.addEventListener('input', function() {
                    if (this.value < 0) this.value = 0;
                    calculateAll();
                });
                input.addEventListener('focus', function() {
                    this.select();
                });
            });
        }

        function calculateAll() {
            let totalItemsOut = 0;
            let totalSalesValue = 0;
            let totalCurrentBalance = 0;

            categories.forEach(cat => {
                const prevEl = document.getElementById(`prev_${cat.id}`);
                const inEl = document.getElementById(`in_${cat.id}`);
                const custReturnEl = document.getElementById(`cust_return_${cat.id}`);
                const outEl = document.getElementById(`out_${cat.id}`);
                const retWhEl = document.getElementById(`ret_wh_${cat.id}`);

                if (prevEl && inEl && custReturnEl && outEl && retWhEl) {
                    const prev = parseInt(prevEl.value) || 0;
                    const inQty = parseInt(inEl.value) || 0;
                    const custReturn = parseInt(custReturnEl.value) || 0;
                    const outQty = parseInt(outEl.value) || 0;
                    const retWh = parseInt(retWhEl.value) || 0;

                    const balance = prev + inQty + custReturn - outQty - retWh;
                    const balEl = document.getElementById(`bal_${cat.id}`);
                    
                    if (balEl) {
                        balEl.textContent = balance;
                        if (balance < 0) {
                            balEl.className = "text-lg font-extrabold text-red-600";
                        } else {
                            balEl.className = "text-lg font-bold text-gray-800";
                        }
                    }

                    totalItemsOut += outQty;
                    totalSalesValue += (outQty * cat.price);
                    totalCurrentBalance += balance;
                }
            });

            const tOut = document.getElementById('totalItemsOut');
            const tVal = document.getElementById('totalSalesValue');
            const tBal = document.getElementById('totalCurrentBalance');

            if (tOut) tOut.textContent = totalItemsOut;
            if (tVal) tVal.textContent = new Intl.NumberFormat('ar-EG').format(totalSalesValue);
            if (tBal) tBal.textContent = totalCurrentBalance;
        }

        function saveRecord() {
            if (!dateInput) return;
            const dateVal = dateInput.value;
            if (!dateVal) {
                showModal("تنبيه", "يرجى اختيار تاريخ الجرد", false);
                return;
            }

            if (categories.length === 0) {
                showModal("تنبيه", "لا يمكنك حفظ جرد فارغ!", false);
                return;
            }

            const record = {
                id: Date.now(),
                date: dateVal,
                items: {},
                totalOut: parseInt(document.getElementById('totalItemsOut')?.textContent || 0),
                totalValue: parseInt(document.getElementById('totalSalesValue')?.textContent.replace(/,/g, '') || 0)
            };

            let hasNegativeBalance = false;

            categories.forEach(cat => {
                const prevEl = document.getElementById(`prev_${cat.id}`);
                const inEl = document.getElementById(`in_${cat.id}`);
                const custReturnEl = document.getElementById(`cust_return_${cat.id}`);
                const outEl = document.getElementById(`out_${cat.id}`);
                const retWhEl = document.getElementById(`ret_wh_${cat.id}`);

                if (prevEl) {
                    const prev = parseInt(prevEl.value) || 0;
                    const inQty = parseInt(inEl.value) || 0;
                    const custReturn = parseInt(custReturnEl.value) || 0;
                    const outQty = parseInt(outEl.value) || 0;
                    const retWh = parseInt(retWhEl.value) || 0;
                    const bal = prev + inQty + custReturn - outQty - retWh;

                    if (bal < 0) hasNegativeBalance = true;
                    record.items[cat.id] = { prev, in: inQty, custReturn, out: outQty, retWh, bal, name: cat.name };
                }
            });

            if (hasNegativeBalance) {
                 showModal("خطأ في الإدخال", "يوجد رصيد سيارة بالسالب. يرجى مراجعة وتعديل المدخلات.", false);
                 return;
            }

            let history = JSON.parse(localStorage.getItem('inventoryHistory')) || [];
            const existingIndex = history.findIndex(r => r.date === dateVal);
            
            if (existingIndex >= 0) {
                history[existingIndex] = record;
            } else {
                history.push(record);
            }

            history.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('inventoryHistory', JSON.stringify(history));
            showModal("تم الحفظ بنجاح", "تم حفظ جرد اليوم وتحديث الأرصدة بنجاح.", true);
            loadHistory();
        }

        if (saveBtn) saveBtn.addEventListener('click', saveRecord);

        function loadHistory() {
            if (!historyTableBody) return;
            const history = JSON.parse(localStorage.getItem('inventoryHistory')) || [];
            historyTableBody.innerHTML = '';

            if (history.length === 0) {
                if (noHistoryMsg) noHistoryMsg.classList.remove('hidden');
                return;
            }
            if (noHistoryMsg) noHistoryMsg.classList.add('hidden');

            const displayHistory = [...history].reverse();

            displayHistory.forEach(record => {
                let itemsDetailsHtml = '';
                for (const id in record.items) {
                    const item = record.items[id];
                    itemsDetailsHtml += `
                        <div class="mb-1 border-b border-gray-100 pb-1 last:border-0">
                            <span class="font-bold text-gray-700">${item.name}:</span> 
                            <span>(سابق: ${item.prev} | وارد: ${item.in} | مبيعات: ${item.out} | متبقي: <b class="text-blue-600">${item.bal}</b>)</span>
                        </div>
                    `;
                }

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors";
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap font-bold text-gray-900">${record.date}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-600">${record.totalOut} كرتونة</td>
                    <td class="px-6 py-4 whitespace-nowrap text-green-600 font-bold">${new Intl.NumberFormat('ar-EG').format(record.totalValue)} ج.م</td>
                    <td class="px-6 py-4 text-xs text-gray-600">${itemsDetailsHtml}</td>
                `;
                historyTableBody.appendChild(tr);
            });
        }

        if (clearHistoryBtn) {
            clearHistoryBtn.addEventListener('click', () => {
                if (confirm('هل أنت متأكد من مسح جميع سجلات الجرد السابقة؟')) {
                    localStorage.removeItem('inventoryHistory');
                    loadHistory();
                    applyCarriedOverBalances();
                    calculateAll();
                    showModal("تم الحذف", "تم مسح السجل بنجاح.", true);
                }
            });
        }

        function showModal(title, message, isSuccess = true) {
            if (!modal || !modalContent) return;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            
            const iconContainer = modal.querySelector('.rounded-full');
            if (iconContainer) {
                if (isSuccess) {
                    iconContainer.className = "mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4";
                    iconContainer.innerHTML = `<svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>`;
                } else {
                    iconContainer.className = "mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4";
                    iconContainer.innerHTML = `<svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>`;
                }
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        if (closeModalBtn) {
            closeModalBtn.addEventListener('click', () => {
                modal.classList.add('opacity-0');
                modalContent.classList.add('scale-95');
                setTimeout(() => modal.classList.add('hidden'), 300);
            });
        }

        if (manageCategoriesBtn) manageCategoriesBtn.addEventListener('click', openManageModal);
        if (addFirstCategoryBtn) addFirstCategoryBtn.addEventListener('click', openManageModal);
        if (closeManageModalBtn) closeManageModalBtn.addEventListener('click', closeManageModal);

        function openManageModal() {
            if (!manageCategoriesModal) return;
            renderManageCategoriesList();
            manageCategoriesModal.classList.remove('hidden');
            setTimeout(() => {
                manageCategoriesModal.classList.remove('opacity-0');
                manageCategoriesModal.querySelector('.transform')?.classList.remove('scale-95');
            }, 10);
        }

        function closeManageModal() {
            if (!manageCategoriesModal) return;
            manageCategoriesModal.classList.add('opacity-0');
            manageCategoriesModal.querySelector('.transform')?.classList.add('scale-95');
            setTimeout(() => manageCategoriesModal.classList.add('hidden'), 300);
        }

        function renderManageCategoriesList() {
            if (!categoriesListContainer) return;
            categoriesListContainer.innerHTML = '';
            categories.forEach((cat) => {
                const itemHtml = `
                    <div class="flex items-center gap-2 bg-gray-50 p-3 rounded-lg border border-gray-200">
                        <span class="text-gray-400 font-bold text-lg">☰</span>
                        <input type="text" value="${cat.name}" id="editName_${cat.id}" class="flex-1 px-2 py-1 text-sm border rounded outline-none">
                        <input type="number" value="${cat.price}" id="editPrice_${cat.id}" class="w-20 px-2 py-1 text-sm border rounded text-center">
                        <span class="text-xs text-gray-400">ج.م</span>
                        <button type="button" class="text-red-500 hover:text-red-700 p-1 delete-cat-btn" data-id="${cat.id}">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                `;
                categoriesListContainer.insertAdjacentHTML('beforeend', itemHtml);
            });

            document.querySelectorAll('.delete-cat-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idToDelete = this.getAttribute('data-id');
                    if(confirm('هل أنت متأكد من حذف هذا الصنف؟')) {
                        categories = categories.filter(c => c.id !== idToDelete);
                        renderManageCategoriesList();
                    }
                });
            });
        }

        if (addCategoryForm) {
            addCategoryForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const name = newCatName.value.trim();
                const price = parseInt(newCatPrice.value);
                if(!name || !price) return;

                categories.push({
                    id: String(Date.now()),
                    name: name,
                    price: price,
                    themeIdx: Math.floor(Math.random() * colorThemes.length)
                });

                newCatName.value = '';
                newCatPrice.value = '';
                renderManageCategoriesList();
            });
        }

        if (saveCategoriesOrderBtn) {
            saveCategoriesOrderBtn.addEventListener('click', () => {
                let updatedCategories = [];
                categories.forEach(cat => {
                    const nameInp = document.getElementById(`editName_${cat.id}`);
                    const priceInp = document.getElementById(`editPrice_${cat.id}`);
                    if(nameInp && priceInp) {
                        updatedCategories.push({
                            id: cat.id,
                            name: nameInp.value.trim() || cat.name,
                            price: parseInt(priceInp.value) || cat.price,
                            themeIdx: cat.themeIdx
                        });
                    } else {
                        updatedCategories.push(cat);
                    }
                });

                categories = updatedCategories;
                localStorage.setItem('inventoryCategories', JSON.stringify(categories));
                renderCategoryForms();
                applyCarriedOverBalances();
                calculateAll();
                closeManageModal();
                showModal("تم التحديث", "تم تحديث الأصناف بنجاح.", true);
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (pwaInstallBanner) {
                pwaInstallBanner.classList.remove('hidden');
                pwaInstallBanner.classList.add('flex');
            }
        });

        if (pwaInstallBtn) {
            pwaInstallBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted' && pwaInstallBanner) pwaInstallBanner.classList.add('hidden');
                    deferredPrompt = null;
                }
            });
        }

        if (pwaDismissBtn) {
            pwaDismissBtn.addEventListener('click', () => {
                if (pwaInstallBanner) pwaInstallBanner.classList.add('hidden');
            });
        }
    });
</script>
